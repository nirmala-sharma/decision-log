<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decision Log</title>
    <link rel="stylesheet" href="decision.css">
    <link rel="stylesheet" href="../global_style/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="decision.js" defer></script> 
</head>

<body>
    <nav>
        <img src="../images/logo.jpg" alt="Logo" class="logo">
        <a href="../register/register.html">Register</a>
        <a href="../login/login.html">Login</a>
    </nav>

    <form id="decision_form">
        <h1 class="form-title"> <i class="fa-solid fa-check"></i>Make a Decision!</h1>
         <select id="categoryId">
        <option value="">Select Category</option>
        <option value="1">School</option>
        <option value="2">Work</option>
        <option value="3">Personal</option>
    </select>
        <div class="container">
            <textarea placeholder="Enter your decision" id="decision_input"></textarea>
        </div>
         <input type="text" id="status" placeholder="Enter Status (e.g., Pending, Done)">
        <input id = "decision_submit" type="submit" value="Add Decision">
    </form>
    <div id="decisions_list"></div>
</body>

</html>
